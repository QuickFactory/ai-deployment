#cloud-config

ssh_pwauth: false
disable_root: false

package_update: true
package_upgrade: true

packages:
  - curl
  - gnupg
  - lsb-release
  - openssl
  - git

# Configured to look for secondary block hardware non-destructively
fs_setup:
  - device: /dev/sdb
    filesystem: ext4
    overwrite: false

# Uses nofail to guarantee boot completion even if no volume is attached
mounts:
  - [ /dev/sdb, /mnt/ai-volume, "ext4", "defaults,noatime,nofail", "0", "0" ]

write_files:
  - path: /opt/ai-stack/init-setup.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -e

      mkdir -p /mnt/ai-volume
      # Dynamically evaluate if an active block drive mountpoint can be recovered
      if ! mountpoint -q /mnt/ai-volume; then
          mount /dev/vdb /mnt/ai-volume 2>/dev/null || mount /dev/sdb /mnt/ai-volume 2>/dev/null || true
      fi

      cd /opt/ai-stack

      GITHUB_USER="QuickFactory"
      GITHUB_REPO="ai-deployment"
      BRANCH="main"
      RAW_URL="https://githubusercontent.com{GITHUB_USER}/${GITHUB_REPO}/${BRANCH}"

      echo "=== 1. Core Config Retrieval ==="
      curl -sSL "${RAW_URL}/docker-compose.yml" -o docker-compose.yml
      curl -sSL "${RAW_URL}/librechat.yaml" -o librechat.yaml

      echo "=== 2. Resolving Target Persistent Storage Space ==="
      # Adaptive fallback logic
      if mountpoint -q /mnt/ai-volume; then
          echo "📁 External storage block discovered. Offloading high-write filesystems to Volume..."
          BASE_DATA_DIR="/mnt/ai-volume"
      else
          echo "💽 No volume detected. Creating local storage clusters inside the application folder..."
          BASE_DATA_DIR="/opt/ai-stack/local_data"
      fi

      # Dynamically provision folders on the selected destination path
      mkdir -p "${BASE_DATA_DIR}/hermes_data"
      mkdir -p "${BASE_DATA_DIR}/rag_data"
      mkdir -p "${BASE_DATA_DIR}/searxng"
      mkdir -p "${BASE_DATA_DIR}/librechat_data"
      mkdir -p "${BASE_DATA_DIR}/mongo_data"
      mkdir -p "${BASE_DATA_DIR}/postgres_data"

      # Symlink structures so that docker-compose can remain identical in both modes
      ln -sfn "${BASE_DATA_DIR}/hermes_data" ./hermes_data
      ln -sfn "${BASE_DATA_DIR}/rag_data" ./rag_data
      ln -sfn "${BASE_DATA_DIR}/searxng" ./searxng
      ln -sfn "${BASE_DATA_DIR}/librechat_data" ./librechat_data
      ln -sfn "${BASE_DATA_DIR}/mongo_data" ./mongo_data
      ln -sfn "${BASE_DATA_DIR}/postgres_data" ./postgres_data

      if [ ! -f ./searxng/settings.yml ]; then
          cat <<EOF > ./searxng/settings.yml
      use_default_settings: true
      server:
        port: 8080
        bind_address: "0.0.0.0"
        secret_key: "$(openssl rand -hex 16)"
      EOF
      fi

      echo "=== 3. Deploying Base Engine Dependencies ==="
      mkdir -p /etc/apt/keyrings
      if [ ! -f /etc/apt/keyrings/docker.gpg ]; then
          curl -fsSL https://docker.com | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      fi
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://docker.com $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

      cat <<'EOF' > /usr/bin/configure-ai
      #!/bin/bash
      cd /opt/ai-stack
      if [ -f .env ]; then
          echo "⚠️  An environment setup file already exists. Modify /opt/ai-stack/.env directly."
          exit 1
      fi

      echo "=========================================================="
      echo "   🚀 INITIALIZING SYSTEM CONFIGURATION"
      echo "=========================================================="
      read -p "Enter your primary root domain (e.g., ai.enabled.world): " USER_DOMAIN
      read -p "Enter your Let's Encrypt Email: " USER_EMAIL
      read -p "Paste your OpenRouter API Key (sk-or-...): " USER_OR_KEY
      read -p "Enter DuckDNS Subdomain (e.g., mysubdomain): " DUCK_SUB
      read -p "Enter DuckDNS Token: " DUCK_TOKEN
      
      echo "=== 🔄 Syncing IP to DuckDNS Hub ==="
      DUCK_RESPONSE=$(curl -s "https://duckdns.org{DUCK_SUB}&token=${DUCK_TOKEN}&ip=")
      
      if [ "$DUCK_RESPONSE" != "OK" ]; then
          echo "❌ DuckDNS Sync Failed! Please check your Token and Subdomain entries."
          exit 1
      fi

      RANDOM_JWT=$(openssl rand -hex 24)
      RANDOM_REFRESH=$(openssl rand -hex 24)
      RANDOM_DB_PASS=$(openssl rand -hex 16)
      RANDOM_HERMES=$(openssl rand -hex 16)

      cat <<EOT > .env
      LIBRECHAT_DOMAIN=$USER_DOMAIN
      LETSENCRYPT_EMAIL=$USER_EMAIL
      OPENROUTER_API_KEY=$USER_OR_KEY
      DUCKDNS_SUBDOMAIN=$DUCK_SUB
      DUCKDNS_TOKEN=$DUCK_TOKEN
      HERMES_INTERNAL_TOKEN=$RANDOM_HERMES
      LIBRECHAT_JWT_SECRET=$RANDOM_JWT
      LIBRECHAT_JWT_REFRESH_SECRET=$RANDOM_REFRESH
      RAG_INTERNAL_API_KEY=$(openssl rand -hex 16)
      POSTGRES_DB_PASSWORD=$RANDOM_DB_PASS
      DISCORD_BOT_TOKEN=change_me_if_needed
      DISCORD_CHANNEL_ID=change_me_if_needed
      EOT

      echo "✅ Environment compiled. Starting Docker Stack containers..."
      docker compose --env-file .env up -d
      echo "🎉 Cluster active!"
      EOF
      chmod +x /usr/bin/configure-ai

  # 2. Updated safe shutdown script with adaptive unmounting parameters
  - path: /opt/ai-stack/safeshut.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -e
      if [ "$EUID" -ne 0 ]; then
        echo "❌ Error: Please execute this script using sudo (sudo ./safeshut.sh)"
        exit 1
      fi
      cd /opt/ai-stack
      echo "=========================================================="
      echo " 🛑 INITIATING GRACEFUL AI STACK SHUTDOWN SEQUENCE"
      echo "=========================================================="
      if [ -f docker-compose.yml ]; then
          echo "=== 1. Stopping Containers & Flushing DB Memory Cache ==="
          docker compose down --timeout 30
          echo "✅ Containers stopped and memory caches flushed to disk."
      fi
      echo "=== 2. Syncing Filesystem Operations ==="
      sync
      sleep 2
      echo "=== 3. Detaching Block Storage Volume Safely ==="
      if mountpoint -q /mnt/ai-volume; then
          umount /mnt/ai-volume
          echo "✅ /mnt/ai-volume unmounted successfully."
      else
          echo "ℹ️  No external volume was mounted. Local drive blocks synchronized."
      fi
      echo "=========================================================="
      echo " 🎉 SHUTDOWN COMPLETE! YOUR DATA IS SAFE."
      echo "=========================================================="

  - path: /etc/update-motd.d/99-ai-stack-status
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      echo "==============================================================="
      echo " 🌟 AI INFRASTRUCTURE INTERFACE ONLINE"
      echo "==============================================================="
      if [ ! -f /opt/ai-stack/.env ]; then
          echo " ➡️  Run: sudo configure-ai"
      else
          echo " ✅ Services running smoothly."
          echo " 🛑 To safely stop or pause billing at any time, run: sudo /opt/ai-stack/safeshut.sh"
      fi
      echo "==============================================================="

runcmd:
  - if [ ! -f /swapfile ]; then fallocate -l 4G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile && echo '/swapfile none swap sw 0 0' >> /etc/fstab; fi
  - mkdir -p /etc/docker
  - echo '{"ipv6":true,"fixed-cidr-v6":"fd00::/80","ip6tables":true}' > /etc/docker/daemon.json
  - systemctl restart docker || true
  - bash /opt/ai-stack/init-setup.sh
