#cloud-config

ssh_pwauth: false
disable_root: false

package_update: true
package_upgrade: true

packages:
  - curl
  - gnupg
  - lsb-release
  - openssl
  - git

write_files:
  # 1. Main Background Core Setup Script
  - path: /opt/ai-stack/init-setup.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -e

      # Create universal directory mountpoint placeholder
      mkdir -p /mnt/ai-volume

      # Non-destructively probe for hardware storage blocks across providers
      TARGET_DEVICE=""
      if [ -b /dev/vdb ]; then
          TARGET_DEVICE="/dev/vdb"
      elif [ -b /dev/sdb ]; then
          TARGET_DEVICE="/dev/sdb"
      fi

      # Dynamically format and attach block targets only if hardware is active
      if [ ! -z "$TARGET_DEVICE" ]; then
          if ! blkid "$TARGET_DEVICE" > /dev/null 2>&1; then
              mkfs.ext4 -F "$TARGET_DEVICE"
          fi
          if ! mountpoint -q /mnt/ai-volume; then
              mount "$TARGET_DEVICE" /mnt/ai-volume
              if ! grep -q "/mnt/ai-volume" /etc/fstab; then
                  echo "${TARGET_DEVICE} /mnt/ai-volume ext4 defaults,noatime,nofail 0 0" >> /etc/fstab
              fi
          fi
      fi

      cd /opt/ai-stack

      GITHUB_USER="QuickFactory"
      GITHUB_REPO="ai-deployment"
      BRANCH="main"
      RAW_URL="https://raw.githubusercontent.com" # CORRECTED URL
      RAW_URL="${RAW_URL}/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}"

      # Helper function for robust curl downloads with retries
      robust_curl() {
          local url=$1
          local output=$2
          local max_attempts=10  # Number of retry attempts
          local delay=5          # Delay between attempts in seconds

          for i in $(seq 1 $max_attempts); do
              if curl -sSL "$url" -o "$output"; then
                  echo "Downloaded $output successfully on attempt $i."
                  return 0
              fi
              echo "Failed to download $output from $url (attempt $i/$max_attempts). Retrying in $delay seconds..."
              sleep $delay
          done
          echo "ERROR: Failed to download $output after $max_attempts attempts. Exiting."
          exit 1
      }

      echo "=== 1. Pulling Core Configuration Manifests ==="
      robust_curl "${RAW_URL}/docker-compose.yml" "docker-compose.yml"
      robust_curl "${RAW_URL}/librechat.yaml" "librechat.yaml"

      echo "=== 2. Adaptive Storage Layer Determination ==="
      if mountpoint -q /mnt/ai-volume; then
          echo "📁 Storage Volume detected. Mapping database matrices onto attached disk block..."
          BASE_DATA_DIR="/mnt/ai-volume"
      else
          echo "💽 No volume attached. Isolating workspace tracks locally onto host storage drive..."
          BASE_DATA_DIR="/opt/ai-stack/local_data"
      fi

      # Establish isolated workspace data directory trees
      mkdir -p "${BASE_DATA_DIR}/hermes_data"
      mkdir -p "${BASE_DATA_DIR}/rag_data"
      mkdir -p "${BASE_DATA_DIR}/searxng"
      mkdir -p "${BASE_DATA_DIR}/librechat_data"
      mkdir -p "${BASE_DATA_DIR}/mongo_data"
      mkdir -p "${BASE_DATA_DIR}/postgres_data"

      # Relative symlink structures so that docker-compose files stay identical across topologies
      ln -sfn "${BASE_DATA_DIR}/hermes_data" ./hermes_data
      ln -sfn "${BASE_DATA_DIR}/rag_data" ./rag_data
      ln -sfn "${BASE_DATA_DIR}/searxng" ./searxng
      ln -sfn "${BASE_DATA_DIR}/librechat_data" ./librechat_data
      ln -sfn "${BASE_DATA_DIR}/mongo_data" ./mongo_data
      ln -sfn "${BASE_DATA_DIR}/postgres_data" ./postgres_data

      if [ ! -f ./searxng/settings.yml ]; then
          cat <<EOF > ./searxng/settings.yml
      use_default_settings: true
      server:
        port: 8080
        bind_address: "0.0.0.0"
        secret_key: "$(openssl rand -hex 16)"
      EOF
      fi

      echo "=== 3. Provisioning Production Docker Engine Pipeline ==="
      mkdir -p /etc/apt/keyrings
      if [ ! -f /etc/apt/keyrings/docker.gpg ]; then
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg # CORRECTED DOCKER GPG URL
      fi
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

      # Securely deploy the localized interactive setup wizard utility
      cat <<'EOF' > /usr/bin/configure-ai
      #!/bin/bash
      cd /opt/ai-stack
      if [ -f .env ]; then
          echo "⚠️  An environment configuration payload (.env) is already present. Modify variables directly."
          exit 1
      fi

      echo "=========================================================="
      echo "   🚀 INITIALIZING CORE WORKSPACE PARAMETERS"
      echo "=========================================================="
      read -p "Enter your primary root domain address (e.g., ai.enabled.world): " USER_DOMAIN
      read -p "Enter your Let's Encrypt notification Email: " USER_EMAIL
      read -p "Paste your OpenRouter API key credential (sk-or-...): " USER_OR_KEY
      read -p "Enter DuckDNS Subdomain identifier (e.g. mysub for mysub.duckdns.org): " DUCK_SUB
      read -p "Enter DuckDNS account authentication Token: " DUCK_TOKEN
      
      echo "=== 🔄 Dispatched Dynamic Update Request to DuckDNS Hub ==="
      DUCK_RESPONSE=$(curl -s "https://www.duckdns.org/update?domains=${DUCK_SUB}&token=${DUCK_TOKEN}&ip=")
      
      if [ "$DUCK_RESPONSE" != "OK" ]; then
          echo "❌ Routing Fault: DuckDNS sync failed. Verify token configuration values."
          exit 1
      fi

      # Encrypted runtime security parameters compilation loop
      RANDOM_JWT=$(openssl rand -hex 24)
      RANDOM_REFRESH=$(openssl rand -hex 24)
      RANDOM_DB_PASS=$(openssl rand -hex 16)
      RANDOM_HERMES=$(openssl rand -hex 16)

      cat <<EOT > .env
      LIBRECHAT_DOMAIN=$USER_DOMAIN
      LETSENCRYPT_EMAIL=$USER_EMAIL
      OPENROUTER_API_KEY=$USER_OR_KEY
      DUCKDNS_SUBDOMAIN=$DUCK_SUB
      DUCKDNS_TOKEN=$DUCK_TOKEN
      HERMES_INTERNAL_TOKEN=$RANDOM_HERMES
      LIBRECHAT_JWT_SECRET=$RANDOM_JWT
      LIBRECHAT_JWT_REFRESH_SECRET=$RANDOM_REFRESH
      RAG_INTERNAL_API_KEY=$(openssl rand -hex 16)
      POSTGRES_DB_PASSWORD=$RANDOM_DB_PASS
      DISCORD_BOT_TOKEN=change_me_if_needed
      DISCORD_CHANNEL_ID=change_me_if_needed
      EOT

      echo "✅ Local settings written. Starting Docker cluster containers..."
      docker compose --env-file .env up -d
      echo "🎉 Installation initialized! Workspace is now active."
      EOF
      chmod +x /usr/bin/configure-ai

  # 2. Local Safe Cluster Shutdown Script 
  - path: /opt/ai-stack/safeshut.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -e
      if [ "$EUID" -ne 0 ]; then
        echo "❌ Error: Please execute this script using sudo (sudo ./safeshut.sh)"
        exit 1
      fi
      cd /opt/ai-stack
      echo "=========================================================="
      echo " 🛑 INITIATING GRACEFUL AI STACK SHUTDOWN SEQUENCE"
      echo "=========================================================="
      if [ -f docker-compose.yml ]; then
          echo "=== 1. Stopping Containers & Flushing DB Memory Cache ==="
          docker compose down --timeout 30
          echo "✅ Containers stopped and memory caches flushed to disk."
      fi
      echo "=== 2. Syncing Filesystem Operations ==="
      sync
      sleep 2
      echo "=== 3. Detaching External Storage Volumes ==="
      if mountpoint -q /mnt/ai-volume; then
          umount /mnt/ai-volume
          echo "✅ /mnt/ai-volume unmounted cleanly."
      else
          echo "ℹ️  No external volume elements active. Internal disk sync complete."
      fi
      echo "=========================================================="
      echo " 🎉 SHUTDOWN COMPLETE! DATA STRUCTURES SAFE."
      echo "=========================================================="

  # 3. Dynamic SSH system access welcome message banner layout
  - path: /etc/update-motd.d/99-ai-stack-status
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      echo "==============================================================="
      echo " 🌟 PORTABLE MULTI-AGENT AI DEPLOYMENT FRAMEWORK ONLINE"
      echo "==============================================================="
      if [ ! -f /opt/ai-stack/.env ]; then
          echo " ➡️  To configure variables and finalize the stack setup, run:"
          echo "    sudo configure-ai"
      else
          echo " ✅ Cluster services executing cleanly."
          echo " 🛑 To stop containers or detach drives safely, run: sudo /opt/ai-stack/safeshut.sh"
      fi
      echo "==============================================================="

runcmd:
  # 1. Expand Virtual Memory (Swap) to stop 4GB RAM low-resource server OOM crashes
  - if [ ! -f /swapfile ]; then fallocate -l 4G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile && echo '/swapfile none swap sw 0 0' >> /etc/fstab; fi
  
  # 2. Configure Docker daemon for native IPv6 network mapping compatibility
  - mkdir -p /etc/docker
  - echo '{"ipv6":true,"fixed-cidr-v6":"fd00::/80","ip6tables":true}' > /etc/docker/daemon.json
  - systemctl restart docker || true

  # 3. Enter your workspace application repository tree
  - mkdir -p /opt/ai-stack
  - cd /opt/ai-stack

  # 4. FIX THE FILE-TO-FOLDER MOUNT CONFLICT (The OCI runtime fix)
  # Pre-build directory structural layouts and touch empty target files
  # BEFORE docker-compose evaluates them.
  - mkdir -p ./hermes_data ./librechat_data ./rag_data ./postgres_data ./mongo_data ./searxng
  - touch ./librechat_data/.env
  - touch ./searxng/settings.yml

  # 5. Kick off your interactive multi-agent configurations configuration setup loop
  - bash /opt/ai-stack/init-setup.sh
